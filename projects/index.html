<script src="https://cdnjs.cloudflare.com/ajax/libs/fuse.js/7.0.0/fuse.min.js"></script>
<script>
    let fuse;
    fetch('/index.json')
        .then(res => res.json())
        .then(data => {
            fuse = new Fuse(data, {
                keys: ['title', 'summary', 'content'],
                threshold: 0.4,
                minMatchCharLength: 2
            });
        });

    const searchToggle = document.getElementById('search-toggle');
    const searchDropdown = document.getElementById('search-dropdown');
    const searchInput = document.getElementById('nav-search-input');
    const searchResults = document.getElementById('nav-search-results');

    searchToggle.addEventListener('click', () => {
        searchDropdown.classList.toggle('active');
        if (searchDropdown.classList.contains('active')) {
            searchInput.focus();
        } else {
            searchInput.value = '';
            searchResults.innerHTML = '';
        }
    });

    searchInput.addEventListener('input', () => {
        const query = searchInput.value.trim();
        if (!fuse || query.length < 2) {
            searchResults.innerHTML = '';
            return;
        }
        const hits = fuse.search(query).slice(0, 6);
        if (hits.length === 0) {
            searchResults.innerHTML = '<div class="search-no-result">No results found.</div>';
        } else {
            searchResults.innerHTML = hits.map(({ item }) => `
                    <a href="${item.uri}" class="search-item">
                        <div class="search-item-title">${item.title}</div>
                        <div class="search-item-summary">${item.summary.substring(0, 80)}...</div>
                    </a>
                `).join('');
        }
    });

    document.addEventListener('click', (e) => {
        if (!e.target.closest('.nav-search')) {
            searchDropdown.classList.remove('active');
            searchInput.value = '';
            searchResults.innerHTML = '';
        }
    });
</script>
