    <main class="container">
        
<section class="intro">
    <h1>Search</h1>
</section>
<div class="search-wrap">
    <input type="text" id="search-input" placeholder="Search essays, projects..." autofocus>
    <div id="search-results"></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/fuse.js/7.0.0/fuse.min.js"></script>
<script>
    fetch('/index.json')
        .then(res => res.json())
        .then(data => {
            const fuse = new Fuse(data, {
                keys: ['title', 'summary', 'content'],
                threshold: 0.4,
                minMatchCharLength: 2
            });

            const input = document.getElementById('search-input');
            const results = document.getElementById('search-results');

            input.addEventListener('input', () => {
                const query = input.value.trim();
                if (query.length < 2) {
                    results.innerHTML = '';
                    return;
                }
                const hits = fuse.search(query).slice(0, 10);
                if (hits.length === 0) {
                    results.innerHTML = '<p class="search-empty">No results found.</p>';
                    return;
                }
                results.innerHTML = hits.map(({ item }) => `
                    <a href="${item.uri}" class="search-result-item">
                        <div class="search-result-title">${item.title}</div>
                        <div class="search-result-summary">${item.summary}</div>
                    </a>
                `).join('');
            });
        });
</script>
